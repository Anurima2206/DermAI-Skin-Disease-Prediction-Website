<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Signup - DermAI</title>

<link rel="stylesheet" href="css/auth.css">
<link rel="stylesheet" href="css/responsive.css">

</head>

<body>
    
<!-- NAVBAR -->
<nav class="navbar">

<div class="nav-logo">
<img src="assets/heart.png">
<span>DermAI</span>
</div>

<ul class="nav-links">
<li><a href="index.html">Home</a></li>
<li><a href="#">Help</a></li>
<li><a href="#">About</a></li>
</ul>

</nav>


<!-- PAGE CONTENT -->
<div class="auth-page">

<!-- LEFT SIDE -->
<div class="auth-left">

<img src="assets/heart.png" class="logo">

<h1>DermAI</h1>

<p>AI Powered Skin Disease Detection</p>

</div>

<div class="auth-right">

<div class="auth-card">

<h2>Create Account</h2>

<form id="signupForm">

<input type="text" placeholder="Username" id="username" required>

<input type="email" placeholder="Email" id="email" required>

<div class="password-field">
<input type="password" placeholder="Password" id="password" required>
<span class="toggle-password" onclick="togglePassword()">👁</span>
</div>

<input type="text" placeholder="Location" id="location">
<input type="hidden" id="latitude">
<input type="hidden" id="longitude">

<input type="text" placeholder="Phone (optional)" id="phone">

<input type="text" placeholder="Mother's Maiden Name" id="answer" required>

<button type="submit">Signup</button>

</form>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

</div>

<script src="js/signup.js"></script>

</body>
</html>
